name: "Build kernels"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat  ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}

      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: ${{ matrix.repos.kernelSource.device }}

      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.device }}_defconfig

      withKernelSU: ${{ matrix.repos.withKernelSU }}
    steps:
      - name: "✨ Create working dir"
        run: mkdir -p $kernelDir

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils-aarch64-linux-gnu bc curl git zip ftp gcc-9-aarch64-linux-gnu libssl-dev lftp zstd wget libfl-dev python3 libarchive-tools
          sudo rm -f /usr/bin/aarch64-linux-gnu-gcc
          sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-9 /usr/bin/aarch64-linux-gnu-gcc
          aarch64-linux-gnu-gcc --version
      - name: "🌟 Clone kernel source => (${{ env.kernelRepo }})"
        working-directory: ./${{ env.kernelDir }}
        run: |
          git clone --recursive --branch $kernelBranch $kernelRepo $kernelName --depth=1

      - name: "😋 Update KernelSU"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        if: ${{ env.withKernelSU == 'true' }}
        run: |
          if [ -d "./KernelSU" ]; then
            rm -rf "./KernelSU"
          fi
          if [ -d "./drivers/kernelsu" ]; then
            rm -rf "./drivers/kernelsu"
          fi
          
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

          echo -e "\nCONFIG_KPROBES=y" >> ./arch/arm64/configs/vendor/gta9pwifi_eur_open_defconfig 
          echo -e "\nCONFIG_HAVE_KPROBES=y" >> ./arch/arm64/configs/vendor/gta9pwifi_eur_open_defconfig 
          echo -e "\nCONFIG_KPROBE_EVENTS=y" >> ./arch/arm64/configs/vendor/gta9pwifi_eur_open_defconfig
          
      - name: "👍 Make defconfig"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
         rm -rf out/
         make ARCH=arm64 mrproper
         make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- vendor/gta9pwifi_eur_open_defconfig 

      - name: "Install Kernel Headers"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
         CFLAGS: "-w"
         KCFLAGS: "-w"
        run: |
         make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- headers_install

      - name: "🎶 Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.geutputs.args }}
          CFLAGS: "-w"
          KCFLAGS: "-w -DCONFIG_HAVE_ARCH_COMPILER_H -Dasm_volatile_goto=asm"
          EXTRA_CFLAGS: "-w -D__GCC_ASM_FLAG_OUTPUTS__"
        run: |
           echo "=== STEP 1: FORCE-CLEANING TREE ==="
           make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- clean
        
           echo "=== STEP 2: INJECTING CODE PATCH ==="
           cat << 'EOF' > $HOME/patch_macro.h
           ifndef __PATCH_MACRO_H__
           define __PATCH_MACRO_H__
        
           undef asm_volatile_goto
           define asm_volatile_goto(x...) do { asm goto(x); asm volatile("" : : : "memory"); } while (0)
        
           endif
           EOF
        
           echo "=== STEP 3: VERIFYING INJECTION WAS SUCCESSFUL ==="
           tail -n 5 include/linux/compiler_types.h
           find include/ -type f -name "*.h" -exec sed -i 's/asm_volatile_goto(x...)[^{]*do { asm goto(x); asm (""); } while (0)/asm_volatile_goto(x...) do { asm goto(x); asm volatile("" : : : "memory"); } while (0)/g' {} +
           find arch/arm64/include/ -type f -name "*.h" -exec sed -i 's/"i" (key)/"S" (\&key->key)/g' {} +
           echo "=== STEP 4: RUNNING COMPILATION ==="
           make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            KCFLAGS="-w -include $HOME/patch_macro.h" \
            CFLAGS="-w -include $HOME/patch_macro.h" \
            EXTRA_CFLAGS="-include $HOME/patch_macro.h" \
            Image
        
      - name: "💛 Upload Image"
        uses: actions/upload-artifact@v4
        with:
          name: Image(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/out/arch/arm64/boot/Image
          if-no-files-found: ignore
          retention-days: 7

      - name: "💙 Upload Image.gz"
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ../${{ env.kernelDir }}/out/arch/arm64/boot/Image.gz
          if-no-files-found: ignore
          retention-days: 7

      - name: "💜 Upload dtb"
        uses: actions/upload-artifact@v4
        with:
          name: dtb(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/out/arch/arm64/boot/dtb
          if-no-files-found: ignore
          retention-days: 7

      - name: "❤️ Upload dtbo.img"
        uses: actions/upload-artifact@v4
        with:
          name: dtbo.img(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/out/arch/arm64/boot/dtbo.img
          if-no-files-found: ignore
          retention-days: 7
