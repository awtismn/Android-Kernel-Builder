name: "Build kernels"

env:
  CONFIGURATION: "repos.json"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat  ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}

      kernelName: gta9pwifi_kernel
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: gta9pwifi_eur_open

      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.device }}_defconfig

      withKernelSU: ${{ matrix.repos.withKernelSU }}
    steps:
      - name: "✨ Create working dir"
        run: mkdir -p $kernelDir

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils-aarch64-linux-gnu bc curl git zip ftp gcc-9-aarch64-linux-gnu libssl-dev lftp zstd wget libfl-dev python3 libarchive-tools
          sudo rm -f /usr/bin/aarch64-linux-gnu-gcc
          sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-9 /usr/bin/aarch64-linux-gnu-gcc
      - name: "🌟 Clone kernel source => (${{ env.kernelRepo }})"
        working-directory: ./${{ env.kernelDir }}
        run: |
          git clone --recursive --branch $kernelBranch $kernelRepo --depth=1

      - name: "😋 Update KernelSU"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        if: ${{ env.withKernelSU == 'true' }}
        run: |
          if [ -d "./KernelSU" ]; then
            rm -rf "./KernelSU"
          fi
          if [ -d "./drivers/kernelsu" ]; then
            rm -rf "./drivers/kernelsu"
          fi
          
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

          echo -e "\nCONFIG_KPROBES=y" >> ./arch/arm64/configs/vendor/gta9pwifi_eur_open_defconfig 
          echo -e "\nCONFIG_HAVE_KPROBES=y" >> ./arch/arm64/configs/vendor/gta9pwifi_eur_open_defconfig 
          echo -e "\nCONFIG_KPROBE_EVENTS=y" >> ./arch/arm64/configs/vendor/gta9pwifi_eur_open_defconfig
          
      - name: "Clean Source Tree"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
         rm -rf out/
         make ARCH=arm64 mrproper
      
      - name: "Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.geutputs.args }}
          KCFLAGS: ""
          CFLAGS: ""
          EXTRA_CFLAGS: ""
        run: |
           echo "==Building The .Config=="
           make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- vendor/gta9pwifi_eur_open_defconfig
           echo "==Spoofing The Headers=="
           find . -name "Makefile*" -o -name "*.mk" | xargs sed -i 's/-Werror=strict-prototypes//g' 2>/dev/null || true
           find . -name "Makefile*" -o -name "*.mk" | xargs sed -i 's/-Werror=implicit-function-declaration//g' 2>/dev/null || true
           find . -name "Makefile*" -o -name "*.mk" | xargs sed -i 's/-Werror=implicit-int//g' 2>/dev/null || true
           find . -name "Makefile*" -o -name "*.mk" | xargs sed -i 's/-Werror=return-type//g' 2>/dev/null || true
           find . -name "Makefile*" -o -name "*.mk" | xargs sed -i 's/=strict-prototypes//g' 2>/dev/null || true
           find . -name "Makefile*" -o -name "*.mk" | xargs sed -i 's/=implicit-function-declaration//g' 2>/dev/null || true
           find . -type f -exec sed -i 's/-Werror=implicit-int//g' {} + 2>/dev/null || true
           find . -type f -exec sed -i 's/-Werror=return-type//g' {} + 2>/dev/null || true
           find . -type f -exec sed -i 's/-Wno-error=implicit-int//g' {} + 2>/dev/null || true
           find . -type f -exec sed -i 's/-Wno-error=return-type//g' {} + 2>/dev/null || true
           find . -type f -exec sed -i 's/=implicit-int//g' {} + 2>/dev/null || true
           find . -type f -exec sed -i 's/=return-type//g' {} + 2>/dev/null || true
           touch .headers_install.cmd
           touch usr/.headers_install.cmd
           mkdir -p include/config/
           touch include/config/headers_install.h
           echo "==Bypassing Compiling Errors and Warnings=="
           find scripts/ -type f -exec sed -i 's/error, forbidden warning//g' {} + 2>/dev/null || true
           sed -i '/walt_task_dump(struct task_struct \*p)/,/}/ s/}/#endif\n}/' kernel/sched/walt/walt.c
           echo "KBUILD_CFLAGS += -Wno-format -Wno-format-zero-length -Wno-stringop-truncation -Wno-error -w" >> Makefile
           echo "KBUILD_CPPFLAGS += -Wno-format -Wno-format-zero-length -Wno-stringop-truncation -Wno-error -w" >> Makefile
           mkdir -p include/firmware
           if [ -f drivers/input/touchscreen/focaltech_touch_spi/focaltech_config.h ]; then
            git checkout -- drivers/input/touchscreen/focaltech_touch_spi/focaltech_config.h 2>/dev/null || true
            sed -i 's|#define FTS_UPGRADE_FW.*_FILE.*|#define FTS_UPGRADE_FW_FILE "fw_sample.i"\n#define FTS_UPGRADE_FW2_FILE "fw_sample.i"\n#define FTS_UPGRADE_FW3_FILE "fw_sample.i"|g' drivers/input/touchscreen/focaltech_touch_spi/focaltech_config.h
            echo "0x00" > drivers/input/touchscreen/focaltech_touch_spi/fw_sample.i
            echo "0x00" > include/firmware/fw_sample.i
           fi
           if [ -f kernel/sched/walt/trace.h ]; then
             sed -i '/#define TRACE_INCLUDE_PATH/d' kernel/sched/walt/trace.h
             sed -i 's|#define TRACE_INCLUDE_FILE trace|#define TRACE_INCLUDE_PATH ../../kernel/sched/walt\n#define TRACE_INCLUDE_FILE trace|g' kernel/sched/walt/trace.h
           fi
           if [ -f kernel/sched/walt/walt.c ]; then
            sed -i 's/#endif//g' kernel/sched/walt/walt.c
            sed -i 's/#if 0//g' kernel/sched/walt/walt.c
            git checkout -- kernel/sched/walt/walt.c 2>/dev/null || true
           fi
           if [ -f kernel/sched/walt/Makefile ]; then
            echo "subdir-ccflags-y += -Wno-format -Wno-error -w" >> kernel/sched/walt/Makefile
            echo "CFLAGS_walt.o := -Wno-format -Wno-error -w" >> kernel/sched/walt/Makefile
            git checkout -- kernel/sched/walt/trace.h 2>/dev/null || true
            echo "ccflags-y += -I\$(srctree)/kernel/sched/walt" >> kernel/sched/walt/Makefile
           fi
           if [ -f mm/slub.c ]; then
            git checkout -- mm/slub.c 2>/dev/null || true
            sed -i 's/static ssize_t slab_owner_filter_write/unsigned long slab_owner_filter = 0;\nunsigned long md_slabowner_dump_size = 16777216;\nunsigned long slab_owner_handles_size = 0;\nstatic ssize_t slab_owner_filter_write/g' mm/slub.c
           fi
           if [ -f security/samsung/defex_lsm/Makefile ]; then
            git checkout -- security/samsung/defex_lsm/Makefile 2>/dev/null || true
            echo "CFLAGS_pack_rules.o := -Wno-stringop-truncation -Wno-error" >> security/samsung/defex_lsm/Makefile
           fi
           if [ -f security/samsung/defex_lsm/pack_rules.c ]; then
            sed -i 's|#define SAFE_STRCOPY.*|#define SAFE_STRCOPY(dst, src) do { snprintf(dst, sizeof(dst), "%s", src); } while(0)|g' security/samsung/defex_lsm/pack_rules.c
           fi
           if [ -f drivers/usb/typec/P86801_tcpc/Makefile ]; then
            echo "ccflags-y += -Idrivers/usb/typec/P86801_tcpc" >> drivers/usb/typec/P86801_tcpc/Makefile
            echo "ccflags-y += -Idrivers/usb/typec/P86801_tcpc/inc" >> drivers/usb/typec/P86801_tcpc/Makefile
           fi
           if [ -f drivers/soc/qcom/minidump_log.c ]; then
            sed -i 's/md_dump_slabinfo();/\/\/ md_dump_slabinfo();/g' drivers/soc/qcom/minidump_log.c
           fi
           mkdir -p scripts
           echo '#!/bin/sh' > scripts/extract-cert
           echo 'exit 0' >> scripts/extract-cert
           chmod +x scripts/extract-cert
           echo "==Build Kernel=="
           mkdir -p certs
           touch certs/x509_certificate_list
           echo "==Finally Building The Kernel=="
           make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-
           
      - name: "💛 Upload Image"
        uses: actions/upload-artifact@v4
        with:
          name: Image
          path: ./${{ env.kernelDir }}/${{ env.kernelName }}/arch/arm64/boot/Image
          retention-days: 7

      - name: "💙 Upload Image.gz"
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz
          path: ./${{ env.kernelDir }}/${{ env.kernelName }}/arch/arm64/boot/Image.gz
          if-no-files-found: ignore
          retention-days: 7

      - name: "💜 Upload dtb"
        uses: actions/upload-artifact@v4
        with:
          name: dtb
          path: ./${{ env.kernelDir }}/${{ env.kernelName }}/arch/arm64/boot/dtb
          if-no-files-found: ignore
          retention-days: 7

      - name: "❤️ Upload dtbo.img"
        uses: actions/upload-artifact@v4
        with:
          name: dtbo.img
          path: ./${{ env.kernelDir }}/${{ env.kernelName }}/arch/arm64/boot/dtbo.img
          if-no-files-found: ignore
          retention-days: 7
